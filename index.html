<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <title>AI Math Scanner - Ultimate Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

    <style>
        :root { --primary: #007bff; --success: #28a745; --danger: #dc3545; }
        body { font-family: 'Kantumruy Pro', sans-serif; background: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .header { font-size: 28px; font-weight: bold; color: var(--primary); margin-bottom: 20px; }
        
        /* Video & Preview Area */
        .preview-area { position: relative; width: 100%; background: #000; border-radius: 15px; overflow: hidden; margin-bottom: 15px; min-height: 300px; }
        video, #image-preview { width: 100%; display: block; }
        #image-preview { display: none; } /* бһӣбһ¶бһҖбҹӢбһ‘бһ»бһҖбһҹбһ·бһ“ бһ”бһҫбһҳбһ·бһ“бһ‘бһ¶бһ“бҹӢ upload */

        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        button { padding: 12px; border: none; border-radius: 10px; font-family: inherit; font-size: 16px; cursor: pointer; transition: 0.3s; color: white; }
        .btn-capture { background: var(--primary); }
        .btn-upload { background: #6c757d; }
        .btn-solve { background: var(--success); width: 100%; font-size: 20px; margin-top: 10px; }
        
        input { width: 100%; padding: 15px; border-radius: 10px; border: 2px solid #eee; font-size: 20px; text-align: center; box-sizing: border-box; margin-top: 10px; }
        #result { margin-top: 20px; padding: 20px; background: #f8f9fa; border-radius: 10px; font-size: 24px; font-weight: bold; min-height: 40px; }
        
        .loading-overlay { display: none; color: var(--primary); font-weight: bold; margin: 10px 0; }
        input[type="file"] { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">Smart AI Math Scanner 2026</div>

    <div class="preview-area">
        <video id="video" autoplay playsinline></video>
        <img id="image-preview" alt="бһҹбһүбҹ’бһүбһ¶бһ”бһ„бҹ’бһ бһ¶бһүбһҡбһјбһ”бһ—бһ¶бһ–">
    </div>

    <div class="controls">
        <button class="btn-capture" onclick="capture()">рҹ“ё бһҗбһҸбһҡбһјбһ”</button>
        <button class="btn-upload" onclick="document.getElementById('fileInput').click()">рҹ“Ғ бһ”бһүбҹ’бһ…бһјбһӣбһҡбһјбһ”</button>
    </div>
    
    <input type="file" id="fileInput" accept="image/*" onchange="handleFileUpload(event)">
    <div id="loading" class="loading-overlay">бһҖбҹҶбһ–бһ»бһ„бһңбһ·бһ—бһ¶бһӮбһҡбһјбһ”бһ—бһ¶бһ–... бһҹбһјбһҳбһҡбһ„бҹӢбһ…бһ¶бҹҶ...</div>

    <input id="expression" placeholder="бһӣбһ‘бҹ’бһ’бһ•бһӣбһҹбҹ’бһҖбҹҒбһ“бһ“бһ№бһ„бһ”бһ„бҹ’бһ бһ¶бһүбһ“бҹ…бһ‘бһёбһ“бҹҒбҹҮ">
    <button class="btn-solve" onclick="solve()">рҹ§  бһӮбһҺбһ“бһ¶бһӣбһ‘бҹ’бһ’бһ•бһӣ</button>

    <div id="result">бһӣбһ‘бҹ’бһ’бһ•бһӣ: -</div>
</div>

<canvas id="canvas" style="display:none;"></canvas>

<script>
    const video = document.getElementById("video");
    const canvas = document.getElementById("canvas");
    const imgPreview = document.getElementById("image-preview");
    const loading = document.getElementById("loading");
    const expressionInput = document.getElementById("expression");

    // бҹЎ. бһ”бһҫбһҖбһҖбһ¶бһҳбҹҒбһҡбҹүбһ¶
    navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
    .then(stream => { video.srcObject = stream; })
    .catch(err => console.log("Camera error: ", err));

    // бҹў. бһҳбһ»бһҒбһ„бһ¶бһҡ Pre-processing (бһҖбҹӮбһҡбһјбһ”бһ—бһ¶бһ–бһұбҹ’бһҷбһ…бҹ’бһ”бһ¶бһҹбҹӢ бһҖбһ¶бһҸбҹӢбһҖбҹ’бһҡбһЎбһ¶бһ…бҹ„бһӣ)
    function preprocessImage(canvas) {
        const ctx = canvas.getContext("2d");
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const data = imageData.data;

        for (let i = 0; i < data.length; i += 4) {
            let avg = (data[i] + data[i + 1] + data[i + 2]) / 3;
            // бһ”бһ„бҹ’бһҖбһҫбһ“ Contrast: бһ”бһҫбһ–бһҺбҹҢбһҹбҹ’бһҡбһ¶бһӣбһұбҹ’бһҷбһ‘бҹ…бһҮбһ¶бһҹ бһ”бһҫбһ–бһҺбҹҢбһҠбһ·бһҸбһұбҹ’бһҷбһ‘бҹ…бһҮбһ¶бһҒбҹ’бһҳбҹ… (бһҮбһҪбһҷбһӣбһ»бһ”бһҖбҹ’бһҡбһЎбһ¶бһҹбҹҖбһңбһ—бҹ…)
            let threshold = 130; 
            let v = (avg > threshold) ? 255 : 0;
            data[i] = data[i + 1] = data[i + 2] = v;
        }
        ctx.putImageData(imageData, 0, 0);
        return canvas.toDataURL();
    }

    // бҹЈ. бһҳбһ»бһҒбһ„бһ¶бһҡбһҗбһҸбһҡбһјбһ”
    function capture() {
        imgPreview.style.display = "none";
        video.style.display = "block";
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext("2d").drawImage(video, 0, 0);
        performOCR(canvas);
    }

    // бҹӨ. бһҳбһ»бһҒбһ„бһ¶бһҡ Upload бһҡбһјбһ”бһ—бһ¶бһ–
    function handleFileUpload(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            imgPreview.src = e.target.result;
            imgPreview.style.display = "block";
            video.style.display = "none";

            const img = new Image();
            img.onload = function() {
                canvas.width = img.width;
                canvas.height = img.height;
                canvas.getContext("2d").drawImage(img, 0, 0);
                performOCR(canvas);
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    // бҹҘ. бһҠбҹҶбһҺбһҫбһҡбһҖбһ¶бһҡ OCR (бһҹбҹ’бһҖбҹҒбһ“бһўбһҖбҹ’бһҹбһҡ)
    async function performOCR(sourceCanvas) {
        loading.style.display = "block";
        expressionInput.value = "";
        
        // бһҖбҹӮбһ…бҹ’бһ“бҹғбһҡбһјбһ”бһ—бһ¶бһ–бһҳбһ»бһ“бһ“бһ№бһ„бһ”бһүбҹ’бһҮбһјбһ“бһ‘бҹ… Tesseract
        const processedDataUrl = preprocessImage(sourceCanvas);

        try {
            const { data: { text } } = await Tesseract.recognize(processedDataUrl, 'eng', {
                logger: m => console.log(m)
            });
            expressionInput.value = cleanText(text);
        } catch (e) {
            alert("бһҹбҹ’бһҖбҹҒбһ“бһҳбһ·бһ“бһҮбҹ„бһӮбһҮбҹҗбһҷ!");
        } finally {
            loading.style.display = "none";
        }
    }
// бһҳбһ»бһҒбһ„бһ¶бһҡбһҹбһҳбҹ’бһўбһ¶бһҸ бһ“бһ·бһ„бһ”бһҳбҹ’бһӣбҹӮбһ„бһ“бһ·бһҳбһ·бһҸбҹ’бһҸбһҹбһүбҹ’бһүбһ¶бһӮбһҺбһ·бһҸбһңбһ·бһ‘бҹ’бһҷбһ¶бһӮбҹ’бһҡбһ”бҹӢбһ”бҹ’бһҡбһ—бҹҒбһ‘
    function cleanText(text) {
        return text
            .toLowerCase()
            .replace(/x/g, '*')           // бһӮбһ»бһҺ
            .replace(/Г·/g, '/')           // бһ…бҹӮбһҖ
            .replace(/вҲҡ|sqrt/g, 'sqrt')   // бһ«бһҹ (Geometry/Arithmetic)
            .replace(/log/g, 'log10')     // бһЎбһјбһҖбһ¶бһҡбһёбһҸ (Algebra)
            .replace(/ln/g, 'log')        // бһЎбһјбһҖбһ¶бһҡбһёбһҸбһ“бҹҒбһ–бҹӮ (Calculus)
            .replace(/sin|cos|tan/g, m => m) // бһҸбҹ’бһҡбһёбһҖбҹ„бһҺбһҳбһ¶бһҸбҹ’бһҡ (Geometry)
            .replace(/ВІ/g, '^2')          // бһҹбҹ’бһңбҹҗбһҷбһӮбһ»бһҺ
            .replace(/[^0-9+\-*/().^,a-z]/g, ''); // бһҡбһҖбҹ’бһҹбһ¶бһ‘бһ»бһҖбһўбһҖбҹ’бһҹбһҡбһҹбһҳбҹ’бһҡбһ¶бһ”бҹӢбһҸбһҪбһҳбһ·бһ“бһҹбҹ’бһӮбһ¶бһӣбҹӢ (Algebra)
    }
  

    function solve() {
        const input = expressionInput.value;
        const resultDiv = document.getElementById("result");
        try {
            let res = input.includes("'") 
                ? "D: " + math.derivative(input.replace(/'/g, ""), 'x').toString()
                : math.evaluate(input);
            resultDiv.innerText = "бһӣбһ‘бҹ’бһ’бһ•бһӣ: " + (Number.isInteger(res) ? res : res);
            resultDiv.style.color = "var(--success)";
        } catch (e) {
            resultDiv.innerText = "бһ‘бһҳбҹ’бһҡбһ„бҹӢбһҳбһ·бһ“бһ‘бһ¶бһ“бҹӢбһҸбҹ’бһҡбһ№бһҳбһҸбҹ’бһҡбһјбһң";
            resultDiv.style.color = "var(--danger)";
        }
    }
</script>
</body>
</html>
